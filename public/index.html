<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disk Manager — macOS</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖥️</text></svg>">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #111113;
  --surface:      #1c1c1e;
  --surface2:     #232325;
  --surface3:     #2a2a2d;
  --border:       #2d2d30;
  --border2:      #3a3a3e;
  --text:         #e5e5ea;
  --text-dim:     #8e8e93;
  --text-dimmer:  #48484a;
  --red:          #ff453a;
  --red-bg:       rgba(255,69,58,.13);
  --red-border:   rgba(255,69,58,.28);
  --amber:        #ff9f0a;
  --amber-bg:     rgba(255,159,10,.12);
  --amber-border: rgba(255,159,10,.28);
  --blue:         #0a84ff;
  --blue-bg:      rgba(10,132,255,.12);
  --blue-border:  rgba(10,132,255,.28);
  --green:        #30d158;
  --green-bg:     rgba(48,209,88,.12);
  --green-border: rgba(48,209,88,.28);
  --gray:         #636366;
  --gray-bg:      rgba(99,99,102,.15);
  --radius:       12px;
  --radius-sm:    8px;
  --radius-xs:    5px;
  --term-h:       240px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
  font-size: 13px;
  line-height: 1.5;
  min-height: 100vh;
  padding-bottom: calc(var(--term-h) + 34px);
}

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #3a3a3e; border-radius: 3px; }

/* ─── TOPBAR ─────────────────────────────────────────────────────────────── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(17,17,19,.9);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 52px;
  display: flex; align-items: center; justify-content: space-between;
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar-icon { font-size: 20px; }
.topbar-title { font-size: 14px; font-weight: 600; letter-spacing: -.3px; }
.topbar-sub   { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
.topbar-right { display: flex; gap: 8px; align-items: center; }

/* ─── BUTTONS ────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 13px; border-radius: var(--radius-xs);
  border: 1px solid transparent; cursor: pointer;
  font-size: 12px; font-weight: 500; font-family: inherit;
  transition: all .12s; white-space: nowrap; line-height: 1;
  user-select: none;
}
.btn:disabled { opacity: .35; cursor: not-allowed; pointer-events: none; }
.btn-primary { background: var(--blue);    color: #fff; border-color: var(--blue); }
.btn-primary:hover { background: #0071e3; }
.btn-danger  { background: var(--red-bg);   color: var(--red);   border-color: var(--red-border); }
.btn-danger:hover  { background: rgba(255,69,58,.22); }
.btn-amber   { background: var(--amber-bg); color: var(--amber); border-color: var(--amber-border); }
.btn-amber:hover   { background: rgba(255,159,10,.22); }
.btn-green   { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
.btn-green:hover   { background: rgba(48,209,88,.22); }
.btn-ghost   { background: transparent;     color: var(--text-dim); border-color: var(--border2); }
.btn-ghost:hover   { background: var(--surface2); color: var(--text); }
.btn-subtle  { background: var(--surface2); color: var(--text-dim); border-color: var(--border); }
.btn-subtle:hover  { background: var(--surface3); color: var(--text); }
.btn-sm { padding: 4px 9px; font-size: 11px; }
.btn-xs { padding: 3px 7px; font-size: 10px; }

/* ─── DISK PANEL ─────────────────────────────────────────────────────────── */
.disk-panel {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
}
.disk-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
}
.disk-card-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
}
.disk-card-label {
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .8px; color: var(--text-dim);
}
.disk-pct-badge {
  font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px;
}
.disk-used { font-size: 26px; font-weight: 700; letter-spacing: -1.5px; line-height: 1; margin-bottom: 8px; }
.disk-bar-track { background: rgba(255,255,255,.07); border-radius: 3px; height: 6px; overflow: hidden; margin-bottom: 7px; }
.disk-bar-fill  { height: 100%; border-radius: 3px; transition: width .9s cubic-bezier(.4,0,.2,1); }
.disk-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); }

/* ─── CONTENT ────────────────────────────────────────────────────────────── */
.content { max-width: 960px; margin: 0 auto; padding: 20px 24px 24px; }

/* ─── STATS BAR ──────────────────────────────────────────────────────────── */
.stats-row {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 22px;
}
.stat-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 14px; text-align: center;
}
.stat-val { font-size: 20px; font-weight: 700; letter-spacing: -.8px; }
.stat-lbl { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; margin-top: 3px; }

/* ─── FILTER BAR ─────────────────────────────────────────────────────────── */
.filter-row {
  display: flex; align-items: center; gap: 6px; margin-bottom: 18px; flex-wrap: wrap;
}
.chip {
  padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
  background: transparent; color: var(--text-dim);
  cursor: pointer; font-size: 12px; font-weight: 500; font-family: inherit;
  transition: all .12s;
}
.chip:hover  { background: var(--surface2); color: var(--text); border-color: var(--border2); }
.chip.active { background: var(--blue-bg); color: var(--blue); border-color: var(--blue-border); }

/* ─── SECTION HDR ────────────────────────────────────────────────────────── */
.section-hdr {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.2px; color: var(--text-dimmer);
  margin: 22px 0 10px;
  display: flex; align-items: center; gap: 8px;
}
.section-hdr::after { content:''; flex:1; height:1px; background: var(--border); }
.section-hdr span { white-space: nowrap; }

/* ─── ITEM CARDS ─────────────────────────────────────────────────────────── */
.card-list { display: flex; flex-direction: column; gap: 6px; }

.item-card {
  background: var(--surface); border: 1px solid var(--border);
  border-left: 3px solid transparent;
  border-radius: var(--radius); overflow: hidden;
  transition: border-color .12s, opacity .2s;
}
.item-card:hover { border-color: var(--border2); }
.item-card[data-action="delete"] { border-left-color: var(--red); }
.item-card[data-action="move"]   { border-left-color: var(--amber); }
.item-card[data-action="brew"]   { border-left-color: #ff9500; }
.item-card[data-action="info"]   { border-left-color: var(--blue); }
.item-card.is-symlink            { border-left-color: var(--green); opacity: .7; }
.item-card.is-empty              { opacity: .3; }
.item-card.running               { border-left-color: var(--blue); animation: pulse-border 1s ease infinite; }
@keyframes pulse-border { 0%,100%{border-left-color:var(--blue)} 50%{border-left-color:#0a84ff88} }

.card-main {
  display: flex; align-items: center;
  padding: 13px 14px; gap: 11px;
}
.card-icon { font-size: 18px; width: 26px; text-align: center; flex-shrink: 0; }
.card-body { flex: 1; min-width: 0; }
.card-label {
  font-size: 13px; font-weight: 600;
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.card-subtitle { font-size: 11px; color: var(--text-dim); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-right { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }

.card-size { font-size: 14px; font-weight: 700; letter-spacing: -.4px; min-width: 58px; text-align: right; }
.size-xl { color: var(--red); }
.size-lg { color: var(--amber); }
.size-sm { color: var(--text-dim); }

.badge { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; padding: 2px 6px; border-radius: 4px; white-space: nowrap; }
.badge-safe   { background: var(--green-bg); color: var(--green); }
.badge-warn   { background: var(--amber-bg); color: var(--amber); }
.badge-moved  { background: var(--green-bg); color: var(--green); }
.badge-empty  { background: var(--gray-bg);  color: var(--gray); }
.badge-info   { background: var(--blue-bg);  color: var(--blue); }

.toggle-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text-dimmer); padding: 3px 6px; border-radius: 4px;
  font-size: 10px; transition: all .12s; font-family: inherit; flex-shrink: 0;
}
.toggle-btn:hover { background: var(--surface3); color: var(--text); }

/* ─── CARD DETAIL ────────────────────────────────────────────────────────── */
.card-detail {
  display: none; border-top: 1px solid var(--border);
  padding: 14px 16px 14px 51px;
  background: rgba(255,255,255,.015);
}
.card-detail.open { display: block; }

.detail-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;
}
.detail-box {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 12px;
}
.detail-box-title {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .7px; color: var(--text-dimmer); margin-bottom: 5px;
}
.detail-box-text { font-size: 12px; color: var(--text-dim); line-height: 1.65; }

.detail-tip {
  background: rgba(10,132,255,.08); border: 1px solid var(--blue-border);
  border-radius: var(--radius-xs); padding: 8px 10px;
  font-size: 11px; color: var(--blue); margin-bottom: 10px; line-height: 1.6;
}
.detail-tip::before { content: "💡 "; }

.detail-path-row {
  font-size: 11px; font-family: "SF Mono", "JetBrains Mono", monospace;
  background: var(--surface2); border: 1px solid var(--border);
  padding: 7px 10px; border-radius: var(--radius-xs);
  color: var(--text-dimmer); word-break: break-all;
}
.detail-target {
  margin-top: 7px; font-size: 11px; color: var(--text-dimmer);
  display: flex; align-items: center; gap: 5px;
}
.detail-target code { color: var(--amber); font-family: "SF Mono", monospace; }

/* ─── TERMINAL — always visible at bottom ────────────────────────────────── */
.term-wrap {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: #0b0b0d; border-top: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: height .22s cubic-bezier(.4,0,.2,1);
  height: 34px; /* collapsed */
}
.term-wrap.expanded { height: var(--term-h); }

.term-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; height: 34px; cursor: pointer; user-select: none;
  flex-shrink: 0;
}
.term-bar-left  { display: flex; align-items: center; gap: 8px; }
.term-bar-right { display: flex; gap: 6px; align-items: center; }

.term-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dimmer); transition: background .3s; }
.term-dot.live { background: var(--green); animation: blink 1s ease infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

.term-label { font-size: 11px; font-weight: 600; color: var(--text-dimmer); }

.term-body {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 4px 16px 10px;
  font-family: "SF Mono", "JetBrains Mono", "Fira Code", monospace;
  font-size: 12px; line-height: 1.8;
  display: none;
}
.term-wrap.expanded .term-body { display: block; }

/* Progress bar inside terminal */
.term-progress {
  height: 3px; background: rgba(255,255,255,.06);
  overflow: hidden; flex-shrink: 0;
  display: none;
}
.term-wrap.expanded .term-progress { display: block; }
.term-progress-bar {
  height: 100%; background: var(--blue);
  transition: width .4s ease;
  animation: progress-shine 1.5s infinite;
}
@keyframes progress-shine {
  0%   { background: var(--blue); }
  50%  { background: #5eb5ff; }
  100% { background: var(--blue); }
}

.log-line { word-break: break-word; padding: 1px 0; display: flex; gap: 8px; align-items: flex-start; }
.log-ts { color: var(--text-dimmer); font-size: 10px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
.log-msg {}
.log-start   .log-msg { color: #ccc; }
.log-success .log-msg { color: var(--green); font-weight: 600; }
.log-error   .log-msg { color: var(--red); font-weight: 600; }
.log-warning .log-msg { color: var(--amber); }
.log-info    .log-msg { color: var(--text-dimmer); }
.log-log     .log-msg { color: #555; }

/* ─── DIALOG ─────────────────────────────────────────────────────────────── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.75); z-index: 300;
  align-items: center; justify-content: center;
  backdrop-filter: blur(8px);
}
.overlay.open { display: flex; }

.dialog {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 16px; padding: 28px 26px 22px;
  max-width: 420px; width: 90%;
  box-shadow: 0 30px 80px rgba(0,0,0,.75);
  animation: pop .16s ease;
}
@keyframes pop { from{transform:scale(.93);opacity:0} to{transform:scale(1);opacity:1} }

.dialog-icon  { font-size: 42px; text-align: center; margin-bottom: 12px; }
.dialog-title { font-size: 17px; font-weight: 700; text-align: center; margin-bottom: 8px; }
.dialog-body  { font-size: 13px; color: var(--text-dim); line-height: 1.7; text-align: center; margin-bottom: 13px; }
.dialog-path  {
  font-size: 11px; font-family: "SF Mono", monospace;
  background: var(--surface2); border: 1px solid var(--border);
  padding: 8px 10px; border-radius: 6px;
  word-break: break-all; color: var(--text-dimmer); text-align: left; margin-bottom: 20px;
}
.dialog-footer { display: flex; gap: 10px; justify-content: center; }

/* ─── SKELETON ───────────────────────────────────────────────────────────── */
.sk { background: linear-gradient(90deg, var(--surface2) 25%, var(--surface3) 50%, var(--surface2) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 4px; }
@keyframes shimmer { to{background-position:-200% 0} }

.spinner { display: inline-block; width: 11px; height: 11px; border: 2px solid rgba(255,255,255,.2); border-top-color: currentColor; border-radius: 50%; animation: spin .65s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

/* ─── EMPTY STATE ────────────────────────────────────────────────────────── */
.empty-state { text-align: center; padding: 50px 20px; color: var(--text-dimmer); }
.empty-state .es-icon  { font-size: 40px; margin-bottom: 10px; }
.empty-state .es-title { font-size: 15px; font-weight: 600; color: var(--text-dim); margin-bottom: 6px; }

@media (max-width: 600px) {
  .disk-panel { grid-template-columns: 1fr; }
  .stats-row  { grid-template-columns: repeat(2,1fr); }
  .detail-grid { grid-template-columns: 1fr; }
  .content { padding: 16px 14px 24px; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-left">
    <span class="topbar-icon" id="os-icon">🖥️</span>
    <div>
      <div class="topbar-title">Disk Manager</div>
      <div class="topbar-sub" id="os-label">Storage Optimizer</div>
    </div>
  </div>
  <div class="topbar-right">
    <span id="os-badge" style="font-size:11px;padding:3px 8px;border-radius:4px;font-weight:600"></span>
    <button class="btn btn-ghost" onclick="doRefresh()" id="btn-scan">↻ Quét lại</button>
    <button class="btn btn-danger" onclick="confirmCleanAll()" id="btn-all">🧹 Dọn tất cả cache</button>
  </div>
</header>

<!-- DISK GAUGES — rendered dynamically -->
<div class="disk-panel" id="disk-panel"></div>

<!-- MAIN CONTENT -->
<div class="content">
  <div class="stats-row">
    <div class="stat-box"><div class="stat-val" id="s-total" style="color:var(--text)">—</div><div class="stat-lbl">Tổng phát hiện</div></div>
    <div class="stat-box"><div class="stat-val" id="s-delete" style="color:var(--red)">—</div><div class="stat-lbl">Có thể xóa</div></div>
    <div class="stat-box"><div class="stat-val" id="s-move" style="color:var(--amber)">—</div><div class="stat-lbl">Nên chuyển</div></div>
    <div class="stat-box"><div class="stat-val" id="s-freed" style="color:var(--green)">0 B</div><div class="stat-lbl">Đã giải phóng</div></div>
  </div>

  <div class="filter-row">
    <button class="chip active" onclick="setFilter('all',this)">Tất cả</button>
    <button class="chip" onclick="setFilter('delete',this)">🗑️ Có thể xóa</button>
    <button class="chip" onclick="setFilter('move',this)">📦 Nên chuyển</button>
    <button class="chip" onclick="setFilter('xcode',this)">⚒️ Xcode</button>
    <button class="chip" onclick="setFilter('cache',this)">🗄️ Cache</button>
    <button class="chip" onclick="setFilter('dev',this)">🔧 Dev Tools</button>
    <button class="chip" onclick="setFilter('app',this)">💻 Apps</button>
  </div>

  <div id="items-area">
    <div class="empty-state">
      <div class="es-icon">🔍</div>
      <div class="es-title">Chưa quét</div>
      <div class="es-sub">Nhấn <strong>Quét lại</strong> để phân tích</div>
    </div>
  </div>
</div>

<!-- ─── TERMINAL (always visible at bottom) ─────────────────────────────── -->
<div class="term-wrap" id="term">
  <div class="term-progress"><div class="term-progress-bar" id="term-prog" style="width:0%"></div></div>
  <div class="term-bar" onclick="toggleTerm()">
    <div class="term-bar-left">
      <div class="term-dot" id="term-dot"></div>
      <span class="term-label" id="term-label">Terminal Output</span>
    </div>
    <div class="term-bar-right">
      <button class="btn btn-xs btn-subtle" onclick="clearLog(event)">Clear</button>
      <span id="term-arrow" style="font-size:10px;color:var(--text-dimmer)">▲</span>
    </div>
  </div>
  <div class="term-body" id="term-body"></div>
</div>

<!-- ─── CONFIRM DIALOG ───────────────────────────────────────────────────── -->
<div class="overlay" id="dlg">
  <div class="dialog">
    <div class="dialog-icon" id="dlg-icon">⚠️</div>
    <div class="dialog-title" id="dlg-title">Xác nhận</div>
    <div class="dialog-body" id="dlg-body"></div>
    <div class="dialog-path" id="dlg-path"></div>
    <div class="dialog-footer">
      <button class="btn btn-ghost" onclick="closeDlg()">Hủy bỏ</button>
      <button class="btn btn-danger" id="dlg-ok" onclick="execDlg()">Xác nhận</button>
    </div>
  </div>
</div>

<script>
// ─── STATE ─────────────────────────────────────────────────────────────────
let items        = [];
let filter       = 'all';
let totalFreed   = 0;
let termExpanded = false;
let isRunning    = false;
let platformInfo = {};

// ─── PLATFORM INIT ─────────────────────────────────────────────────────────
async function initPlatform() {
  try {
    const { data } = await fetch('/api/platform').then(r => r.json());
    platformInfo = data;
    const isWin = data.os === 'windows';

    // Topbar
    q('#os-icon').textContent = isWin ? '🪟' : '🍎';
    q('#os-label').textContent = isWin ? 'Windows Storage Optimizer' : 'macOS Storage Optimizer';
    const badge = q('#os-badge');
    badge.textContent = isWin ? 'Windows' : 'macOS';
    badge.style.cssText = isWin
      ? 'background:rgba(0,120,212,.15);color:#0078d4;border:1px solid rgba(0,120,212,.3)'
      : 'background:rgba(255,255,255,.07);color:#8e8e93;border:1px solid var(--border)';

    // Section title for move
    SECTIONS.move.title = isWin
      ? '📦 NÊN CHUYỂN SANG Ổ KHÁC'
      : '📦 NÊN CHUYỂN SANG /Volumes/Data';
    if (isWin) delete SECTIONS.brew; // no brew on Windows
  } catch(e) { console.error(e); }
}

// ─── DISK ──────────────────────────────────────────────────────────────────
async function loadDisk() {
  try {
    const { data } = await fetch('/api/disk').then(r => r.json());
    const panel = q('#disk-panel');
    const drives = Object.entries(data);
    if (!drives.length) { panel.innerHTML = '<div style="color:var(--text-dimmer);padding:14px">Không đọc được thông tin ổ đĩa</div>'; return; }

    // Show max 4 drives, prioritize main + data drives
    const sorted = drives.sort((a, b) => b[1].pct - a[1].pct);
    const shown = sorted.slice(0, 4);

    panel.innerHTML = shown.map(([mount, d]) => {
      const isMain = mount === '/' || mount === 'C:\\';
      const defColor = isMain ? 'var(--green)' : 'var(--blue)';
      const color = d.pct >= 90 ? 'var(--red)' : d.pct >= 75 ? 'var(--amber)' : defColor;
      const bgColor = color === 'var(--red)' ? 'var(--red-bg)' : color === 'var(--amber)' ? 'var(--amber-bg)' : 'var(--green-bg)';
      const label = mount === '/' ? '💿 Ổ hệ điều hành (/)' : mount === 'C:\\' ? '💿 Ổ C: (Hệ điều hành)' : `📦 Ổ ${mount}`;
      return `
      <div class="disk-card">
        <div class="disk-card-header">
          <div class="disk-card-label">${label}</div>
          <span class="disk-pct-badge" style="background:${bgColor};color:${color}">${d.pct}%</span>
        </div>
        <div class="disk-used" style="color:${color}">${fmtB(d.used)}</div>
        <div class="disk-bar-track"><div class="disk-bar-fill" style="width:${d.pct}%;background:${color}"></div></div>
        <div class="disk-meta"><span>Trống ${fmtB(d.available)} / Tổng ${fmtB(d.total)}</span></div>
      </div>`;
    }).join('');

    // Adjust grid columns
    panel.style.gridTemplateColumns = shown.length === 1 ? '1fr' : shown.length === 2 ? '1fr 1fr' : 'repeat(auto-fit,minmax(200px,1fr))';
  } catch(e) { console.error(e); }
}

// ─── SCAN ──────────────────────────────────────────────────────────────────
async function scan() {
  const btn = q('#btn-scan');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Đang quét...';

  q('#items-area').innerHTML = Array(6).fill(0).map(() => `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:6px;display:flex;gap:12px;align-items:center">
      <div class="sk" style="width:26px;height:26px;border-radius:6px;flex-shrink:0"></div>
      <div style="flex:1"><div class="sk" style="width:55%;height:13px;margin-bottom:7px"></div><div class="sk" style="width:38%;height:11px"></div></div>
      <div class="sk" style="width:60px;height:18px;border-radius:6px"></div>
    </div>`).join('');

  try {
    const { data } = await fetch('/api/scan').then(r => r.json());
    items = data;
    renderItems();
    updateStats();
  } catch(e) {
    log({ type:'error', message:'❌ Lỗi kết nối: ' + e.message });
  }
  btn.disabled = false;
  btn.innerHTML = '↻ Quét lại';
}

// ─── RENDER ────────────────────────────────────────────────────────────────
const SECTIONS = {
  delete: { title: '🗑️  CÓ THỂ XÓA NGAY — An toàn 100%',     color: 'var(--red)'   },
  brew:   { title: '🍺 DỌN BẰNG HOMEBREW',                     color: '#ff9500'      },
  move:   { title: '📦 NÊN CHUYỂN SANG /Volumes/Data',         color: 'var(--amber)' },
  info:   { title: 'ℹ️  THÔNG TIN — Quản lý thủ công',         color: 'var(--blue)'  },
};

function renderItems() {
  let list = items;
  if (filter === 'delete') list = items.filter(i => i.action === 'delete' || i.action === 'brew');
  else if (filter === 'move')  list = items.filter(i => i.action === 'move');
  else if (filter !== 'all')   list = items.filter(i => i.category === filter);

  if (!list.length) {
    q('#items-area').innerHTML = `<div class="empty-state"><div class="es-icon">🔎</div><div class="es-title">Không có mục nào</div></div>`;
    return;
  }

  const groups = { delete:[], brew:[], move:[], info:[] };
  list.forEach(i => {
    const key = i.isSymlink ? 'info' : (i.action in groups ? i.action : 'info');
    groups[key].push(i);
  });

  let html = '';
  for (const [key, sec] of Object.entries(SECTIONS)) {
    if (!groups[key].length) continue;
    html += `<div class="section-hdr"><span style="color:${sec.color}">${sec.title}</span></div>`;
    html += `<div class="card-list">${groups[key].map(renderCard).join('')}</div>`;
  }
  q('#items-area').innerHTML = html;
}

function renderCard(item) {
  const empty   = !item.exists || item.sizeBytes === 0;
  const symlink = item.isSymlink;
  const cls = `item-card${symlink ? ' is-symlink' : empty ? ' is-empty' : ''}`;

  let sizeHtml;
  if (symlink) {
    sizeHtml = `<span class="badge badge-moved">✓ Đã chuyển</span>`;
  } else if (empty) {
    sizeHtml = `<span class="badge badge-empty">Trống</span>`;
  } else {
    const sc = item.sizeBytes > 5e9 ? 'size-xl' : item.sizeBytes > 1e9 ? 'size-lg' : 'size-sm';
    sizeHtml = `<span class="card-size ${sc}">${item.sizeFormatted}</span>`;
  }

  const safeBadge = item.safetyLevel === 'safe'
    ? `<span class="badge badge-safe">✓ AN TOÀN</span>`
    : item.safetyLevel === 'caution'
    ? `<span class="badge badge-warn">⚠ CẨN THẬN</span>`
    : item.safetyLevel === 'movable'
    ? `<span class="badge badge-info">→ CHUYỂN</span>`
    : '';

  let actBtn = '';
  if (!empty && !symlink) {
    if (item.action === 'delete')
      actBtn = `<button class="btn btn-sm btn-danger" onclick="confirmOp('${item.id}','delete')">🗑️ Xóa</button>`;
    else if (item.action === 'move')
      actBtn = `<button class="btn btn-sm btn-amber" onclick="confirmOp('${item.id}','move')">📦 Chuyển</button>`;
    else if (item.action === 'brew')
      actBtn = `<button class="btn btn-sm btn-amber" style="color:#ff9500" onclick="confirmOp('${item.id}','brew')">🍺 Dọn</button>`;
  }
  if (symlink)
    actBtn = `<button class="btn btn-sm btn-ghost" onclick="confirmOp('${item.id}','restore')">↩️ Khôi phục</button>`;

  return `
  <div class="${cls}" data-action="${item.action}" data-id="${item.id}" id="c-${item.id}">
    <div class="card-main">
      <div class="card-icon">${item.icon}</div>
      <div class="card-body">
        <div class="card-label">${item.label} ${safeBadge}</div>
        <div class="card-subtitle">${item.title}</div>
      </div>
      <div class="card-right">
        ${sizeHtml}
        ${actBtn}
        <button class="toggle-btn" onclick="toggleDetail('${item.id}')" id="tb-${item.id}" title="Chi tiết">▾</button>
      </div>
    </div>
    <div class="card-detail" id="d-${item.id}">
      ${item.tip ? `<div class="detail-tip">${item.tip}</div>` : ''}
      <div class="detail-grid">
        <div class="detail-box">
          <div class="detail-box-title">📖 Là gì?</div>
          <div class="detail-box-text">${item.description}</div>
        </div>
        <div class="detail-box">
          <div class="detail-box-title">⚡ Điều gì xảy ra?</div>
          <div class="detail-box-text">${item.consequence}</div>
        </div>
      </div>
      <div class="detail-path-row">${item.path}${symlink ? ` <span style="color:var(--green)"> → ${item.symlinkTarget||'...'}</span>` : ''}</div>
      ${item.moveTarget ? `<div class="detail-target">📦 Đích chuyển: <code>${item.moveTarget}</code></div>` : ''}
      ${item.manageCmd  ? `<div class="detail-target">🖥️ Lệnh: <code style="color:var(--blue)">${item.manageCmd}</code></div>` : ''}
    </div>
  </div>`;
}

function toggleDetail(id) {
  const d = q(`#d-${id}`), t = q(`#tb-${id}`);
  const open = d.classList.toggle('open');
  t.textContent = open ? '▴' : '▾';
}

function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderItems();
}

function updateStats() {
  let tot = 0, del = 0, mv = 0;
  items.forEach(i => {
    if (!i.isSymlink && i.sizeBytes) {
      tot += i.sizeBytes;
      if (i.action === 'delete' || i.action === 'brew') del += i.sizeBytes;
      if (i.action === 'move') mv += i.sizeBytes;
    }
  });
  q('#s-total').textContent = fmtB(tot);
  q('#s-delete').textContent = fmtB(del);
  q('#s-move').textContent = fmtB(mv);
}

// ─── OPERATIONS ────────────────────────────────────────────────────────────

function confirmOp(id, type) {
  const item = items.find(i => i.id === id);
  if (!item) return;

  const bodies = {
    delete:  `Sẽ xóa <strong>${item.sizeFormatted}</strong> khỏi ổ hệ điều hành.<br><span style="font-size:12px;color:var(--text-dim)">${item.consequence}</span>`,
    move:    `Chuyển <strong>${item.sizeFormatted}</strong> sang ổ Data và tạo symlink.<br><span style="font-size:12px;color:var(--text-dim)">App tiếp tục hoạt động bình thường. Có thể khôi phục bất cứ lúc nào.</span>`,
    brew:    `Chạy <code style="background:var(--surface3);padding:1px 5px;border-radius:3px">brew cleanup --prune=all</code><br><span style="font-size:12px;color:var(--text-dim)">Giữ lại phiên bản đang dùng, chỉ xóa bản cũ an toàn.</span>`,
    restore: `Khôi phục <strong>${item.label}</strong> về ổ hệ điều hành.<br><span style="font-size:12px;color:var(--text-dim)">Xóa symlink và move data về lại đúng chỗ cũ.</span>`,
  };
  const cfgs = {
    delete:  { icon:'🗑️', title:`Xóa ${item.label}?`,             okCls:'btn-danger', okTxt:'🗑️ Xóa ngay' },
    move:    { icon:'📦', title:`Chuyển sang /Volumes/Data?`,      okCls:'btn-amber',  okTxt:'📦 Chuyển' },
    brew:    { icon:'🍺', title:`Dọn Homebrew cache?`,             okCls:'btn-amber',  okTxt:'🍺 Dọn ngay' },
    restore: { icon:'↩️', title:`Khôi phục về ổ hệ điều hành?`,   okCls:'btn-ghost',  okTxt:'↩️ Khôi phục' },
  };

  const c = cfgs[type];
  q('#dlg-icon').textContent  = c.icon;
  q('#dlg-title').textContent = c.title;
  q('#dlg-body').innerHTML    = bodies[type] || '';
  q('#dlg-path').textContent  = item.path + (item.moveTarget ? '\n→ ' + item.moveTarget : '');
  const ok = q('#dlg-ok');
  ok.className  = `btn ${c.okCls}`;
  ok.textContent = c.okTxt;

  // Store op data in dialog itself — survives closeDlg reset
  q('#dlg').dataset.opId   = id;
  q('#dlg').dataset.opType = type;
  q('#dlg').classList.add('open');
}

function confirmCleanAll() {
  const toDelete = items.filter(i => (i.action === 'delete' || i.action === 'brew') && !i.isSymlink && i.sizeBytes);
  const total = toDelete.reduce((s, i) => s + i.sizeBytes, 0);

  q('#dlg-icon').textContent  = '🧹';
  q('#dlg-title').textContent = 'Dọn tổng tất cả cache?';
  q('#dlg-body').innerHTML    = `Sẽ xóa <strong>${toDelete.length} mục</strong>, giải phóng tổng <strong>${fmtB(total)}</strong>.<br>
    <span style="font-size:12px;color:var(--text-dim)">
      Xóa: Xcode DerivedData, pip, CocoaPods, npm, Gradle, Go build, Google, Playwright, Electron, node-gyp + Homebrew cleanup.<br>
      <strong style="color:var(--amber)">Không xóa:</strong> cargo, VSCode, Chrome, Downloads, iOS DeviceSupport.
    </span>`;
  q('#dlg-path').textContent = '✅ Chỉ xóa cache — an toàn 100%';
  const ok = q('#dlg-ok');
  ok.className   = 'btn btn-danger';
  ok.textContent = '🧹 Dọn tổng';

  q('#dlg').dataset.opId   = '';
  q('#dlg').dataset.opType = 'clean-all';
  q('#dlg').classList.add('open');
}

function closeDlg() {
  q('#dlg').classList.remove('open');
}

// ─── FIX: Read op data from dialog dataset BEFORE closing dialog ──────────
async function execDlg() {
  const dlg  = q('#dlg');
  const id   = dlg.dataset.opId;
  const type = dlg.dataset.opType;
  closeDlg(); // safe to close now, we already extracted id & type

  if (!type) return;

  openTerm();
  setRunning(true);

  if (type === 'clean-all') {
    q('#btn-all').disabled = true;
    await streamOp('/api/clean-all', {});
    q('#btn-all').disabled = false;
    setRunning(false);
    await loadDisk();
    await scan();
    return;
  }

  // Disable buttons on this card while running
  const card = q(`#c-${id}`);
  if (card) {
    card.classList.add('running');
    card.querySelectorAll('.btn').forEach(b => b.disabled = true);
  }

  const endpoint = type === 'restore' ? '/api/restore' : '/api/operation';
  await streamOp(endpoint, { id, type });
  setRunning(false);

  // Re-scan just this item
  await rescanItem(id);
  await loadDisk();
}

async function streamOp(url, body) {
  let progress = 0;
  setProgress(5);

  try {
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    let step = 10;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();

      for (const part of parts) {
        if (!part.startsWith('data: ')) continue;
        try {
          const d = JSON.parse(part.slice(6));
          log(d);

          // Animate progress
          step = Math.min(step + 12, 90);
          setProgress(step);

          if (d.freed) {
            totalFreed += d.freed;
            q('#s-freed').textContent = fmtB(totalFreed);
          }
          if (d.type === 'done') setProgress(100);
        } catch {}
      }
    }
  } catch(e) {
    log({ type: 'error', message: '❌ Lỗi kết nối: ' + e.message });
  }

  setTimeout(() => setProgress(0), 800);
}

async function rescanItem(id) {
  try {
    const { data } = await fetch('/api/scan').then(r => r.json());
    const updated = data.find(i => i.id === id);
    if (!updated) return;
    items = items.map(i => i.id === id ? updated : i);

    const old = q(`#c-${id}`);
    if (old) {
      const tmp = document.createElement('div');
      tmp.innerHTML = renderCard(updated);
      old.replaceWith(tmp.firstElementChild);
    }
    updateStats();
  } catch {}
}

// ─── TERMINAL ──────────────────────────────────────────────────────────────

function log(d) {
  const body = q('#term-body');
  const now  = new Date();
  const ts   = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0') + ':' + now.getSeconds().toString().padStart(2,'0');

  const el = document.createElement('div');
  el.className = `log-line log-${d.type || 'log'}`;
  el.innerHTML = `<span class="log-ts">${ts}</span><span class="log-msg">${escHtml(d.message || '')}</span>`;
  body.appendChild(el);
  body.scrollTop = body.scrollHeight;

  // Auto-expand if important
  if (!termExpanded && (d.type === 'start' || d.type === 'error' || d.type === 'success')) {
    openTerm();
  }

  // Flash label
  const lbl = q('#term-label');
  lbl.style.color = 'var(--text)';
  setTimeout(() => lbl.style.color = '', 600);
}

function clearLog(e) {
  e.stopPropagation();
  q('#term-body').innerHTML = '';
}

function toggleTerm() {
  termExpanded = !termExpanded;
  q('#term').classList.toggle('expanded', termExpanded);
  q('#term-arrow').textContent = termExpanded ? '▼' : '▲';
  if (termExpanded) {
    setTimeout(() => { q('#term-body').scrollTop = q('#term-body').scrollHeight; }, 50);
  }
}

function openTerm() {
  if (!termExpanded) toggleTerm();
}

function setRunning(on) {
  isRunning = on;
  q('#term-dot').classList.toggle('live', on);
  q('#term-label').textContent = on ? '● Đang thực hiện...' : 'Terminal Output';
  q('#btn-scan').disabled = on;
}

function setProgress(pct) {
  q('#term-prog').style.width = pct + '%';
  q('#term-prog').style.background = pct === 100 ? 'var(--green)' : 'var(--blue)';
}

// ─── UTILS ─────────────────────────────────────────────────────────────────
function fmtB(b) {
  if (!b || b === 0) return '0 B';
  const u = ['B','KB','MB','GB','TB'];
  let i = 0, s = b;
  while (s >= 1024 && i < 4) { s /= 1024; i++; }
  return `${s.toFixed(i > 1 ? 1 : 0)} ${u[i]}`;
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function q(sel) { return document.querySelector(sel); }
function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderItems();
}

// ─── INIT ───────────────────────────────────────────────────────────────────
async function doRefresh() {
  await initPlatform();
  await loadDisk();
  await scan();
}

doRefresh();
</script>
